<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff8c00, #ffb347);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            margin: auto;
            animation: float 3s ease-in-out infinite;
        }

        .name {
            text-align: center;
            margin-top: 15px;
            font-size: 24px;
            font-weight: bold;
        }

        .class {
            text-align: center;
            color: #ccc;
            margin-top: 5px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .stat {
            width: 31%;
            background: rgba(255, 255, 255, .08);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .stat h3 {
            color: #ffb347;
        }

        .ring {
            width: 150px;
            height: 150px;
            margin: auto;
            border-radius: 50%;
            background: conic-gradient(#ff8c00 330deg, #1b2d45 0deg);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .inner {
            width: 110px;
            height: 110px;
            background: #0d1b2a;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #ffb347;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="phone">

        <div class="header">
            <h2>👤 Student Profile</h2>
            <p>Academic Information</p>
        </div>

        <div class="avatar">🎓</div>
        <div class="name" id="studentName">
            Student Name
        </div>
        <div class="class">Class 12 • Science</div>

        <div class="stats">

            <div class="stat">
                <h3>92%</h3>
                Attendance
            </div>

            <div class="stat">
                <h3>5</h3>
                Rank
            </div>

            <div class="stat">
                <h3>A+</h3>
                Grade
            </div>

        </div>

        <br>

        <div class="card">

            <h3 style="text-align:center;">📊 Attendance</h3>

            <br>

            <div class="ring">
                <div class="inner">92%</div>
            </div>

        </div>

        <div class="card">
            🏆 Science Quiz Winner
        </div>

        <div class="card">
            ⭐ Top Performer
        </div>

        <div class="card">
            🎖 Excellent Attendance
        </div>

        <p>
            Phone : +91
            <span id="mobileNumber">
                XXXXX XXXXX
            </span>
        </p>

        <div class="bottom-nav">

            <div onclick="location.href='dashboard.html'">🏠</div>

            <div onclick="location.href='notices.html'">📢</div>

            <div onclick="location.href='notes.html'">📚</div>

            <div>👤</div>

        </div>

    </div>
    <script>

        let studentName =
            localStorage.getItem("studentName");

        let studentMobile =
            localStorage.getItem("studentMobile");

        if (studentName) {

            document.getElementById(
                "studentName"
            ).innerHTML = studentName;

        }

        if (studentMobile) {

            document.getElementById(
                "mobileNumber"
            ).innerHTML = studentMobile;

        }

    </script>
</body>

</html>

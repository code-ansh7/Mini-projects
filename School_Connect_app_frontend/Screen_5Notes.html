 <!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notes</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#09131f,#0d1b2a,#13243d);
}

.phone{

width:370px;
height:760px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(15px);

border-radius:35px;

padding:20px;

color:white;

position:relative;

overflow:hidden;

box-shadow:0 0 30px rgba(0,0,0,.5);

}

.header{

background:linear-gradient(135deg,#ff8c00,#ffb347);

padding:18px;

border-radius:20px;

color:black;

animation:slideDown .8s ease;

}

.search{

margin-top:15px;

}

.search input{

width:100%;

padding:12px;

border:none;

outline:none;

border-radius:12px;

background:rgba(255,255,255,0.08);

color:white;

}

.notes-list{

margin-top:20px;

height:500px;

overflow-y:auto;

}

.note-card{

background:rgba(255,255,255,0.08);

padding:18px;

border-radius:18px;

margin-bottom:15px;

transition:.3s;

animation:fadeUp .8s ease;

}

.note-card:hover{

transform:translateY(-5px);

background:rgba(255,255,255,0.15);

}

.subject{

font-size:18px;

font-weight:bold;

color:#ffb347;

}

.download-btn{

margin-top:12px;

padding:8px 14px;

border:none;

border-radius:10px;

background:linear-gradient(135deg,#ff8c00,#ffb347);

cursor:pointer;

font-weight:bold;

}

.bottom-nav{

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%);

width:320px;

display:flex;

justify-content:space-around;

padding:15px;

border-radius:20px;

background:rgba(255,255,255,0.08);

}

.bottom-nav div{

font-size:24px;

cursor:pointer;

transition:.3s;

}

.bottom-nav div:hover{

transform:scale(1.2);

}

@keyframes slideDown{

from{
opacity:0;
transform:translateY(-20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="phone">

<div class="header">

<h2>📚 Study Notes</h2>

<p>Download subject-wise notes</p>

</div>

<div class="search">

<input type="text" placeholder="Search Notes...">

</div>

<div class="notes-list">

<div class="note-card">

<div class="subject">
📐 Mathematics
</div>

<p>Chapter 1 Complete Notes</p>

<button class="download-btn">
⬇ Download PDF
</button>

</div>

<div class="note-card">

<div class="subject">
⚛ Physics
</div>

<p>Motion and Laws Notes</p>

<button class="download-btn">
⬇ Download PDF
</button>

</div>

<div class="note-card">

<div class="subject">
🧪 Chemistry
</div>

<p>Periodic Table Notes</p>

<button class="download-btn">
⬇ Download PDF
</button>

</div>

<div class="note-card">

<div class="subject">
📖 English
</div>

<p>Essay Writing Notes</p>

<button class="download-btn">
⬇ Download PDF
</button>

</div>

</div>

<div class="bottom-nav">

<div onclick="location.href='dashboard.html'">
🏠
</div>

<div onclick="location.href='notices.html'">
📢
</div>

<div>
📚
</div>

<div onclick="location.href='profile.html'">
👤
</div>

</div>

</div>

</body>

</html>
